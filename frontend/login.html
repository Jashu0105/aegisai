<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zytherion AI - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Zytherion Hub</h2>
    <p class="auth-subtitle">Welcome back. Authenticate to access the AI core.</p>

    <div class="input-group">
      <label for="email">Secure Identity (Email)</label>
      <input type="email" id="email" class="auth-input" placeholder="name@domain.com" autocomplete="off" />
    </div>

    <div class="input-group">
      <label for="password">Passkey</label>
      <input type="password" id="password" class="auth-input" placeholder="••••••••" />
    </div>

    <button onclick="login()" class="auth-btn">Initialize Connection</button>

    <p class="auth-footer">New pilot? <a href="register.html">Register Terminal</a></p>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  try {
    const res = await fetch("https://aegisai-backend-ifvc.onrender.com/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "index.html"; 
    } else {
      alert(data.message || "Authentication failed");
    }
  } catch (error) {
    alert("System core connection error. Try again later.");
  }
}
</script>

</body>
</html>
