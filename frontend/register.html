<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zytherion AI - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Create Core Profile</h2>
    <p class="auth-subtitle">Register a new access point configuration profile.</p>

    <div class="input-group">
      <label for="email">Identity Email</label>
      <input type="email" id="email" class="auth-input" placeholder="name@domain.com" autocomplete="off" />
    </div>

    <div class="input-group">
      <label for="password">Create Security Passkey</label>
      <input type="password" id="password" class="auth-input" placeholder="••••••••" />
    </div>

    <button onclick="register()" class="auth-btn">Establish Profile</button>

    <p class="auth-footer">Profile exists? <a href="login.html">Access Core</a></p>
  </div>
</div>

<script>
async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Fields cannot be left blank.");
    return;
  }

  try {
    const res = await fetch("https://aegisai-backend-ifvc.onrender.com/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok || data.message === "User registered successfully") {
      alert("Registration complete! Access terminal opened.");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Registration encountered an anomaly.");
    }
  } catch(e) {
    alert("Connection interface dropped.");
  }
}
</script>

</body>
</html>
