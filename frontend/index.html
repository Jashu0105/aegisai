<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #d1a85c;
            --accent-glow: rgba(209, 168, 92, 0.15);
            --chat-user-bg: rgba(209, 168, 92, 0.15);
            --chat-bot-bg: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #b89146;
            --accent-glow: rgba(184, 145, 70, 0.1);
            --chat-user-bg: rgba(184, 145, 70, 0.15);
            --chat-bot-bg: rgba(15, 23, 42, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Glassmorphic App Structure */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        /* Top Header Control Bar */
        .top-bar {
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.02);
        }

        .brand-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .brand-title span {
            color: var(--accent);
        }

        .controls-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ui-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .ui-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Chat Architecture Container */
        .chat-viewports {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-viewports::-webkit-scrollbar {
            width: 6px;
        }
        .chat-viewports::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        .message {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .message.user {
            background: var(--chat-user-bg);
            border: 1px solid var(--glass-border);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: var(--chat-bot-bg);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Pulse Skeleton Loader State */
        .pulse-loader {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .pulse-dot:nth-child(1) { animation-delay: -0.32s; }
        .pulse-dot:nth-child(2) { animation-delay: -0.16s; }

        /* Input Deck Frame */
        .input-dock {
            padding: 30px 40px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 100%);
        }

        .input-wrapper {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 6px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 14px 18px;
            font-size: 15px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-action-btn {
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        .send-action-btn:hover {
            opacity: 0.9;
        }
        .send-action-btn:active {
            transform: scale(0.97);
        }

        /* Sidebar Elements */
        .sidebar-header {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .local-history-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(255,255,255,0.01);
            border: 1px solid transparent;
        }

        .history-item:hover {
            color: var(--text-main);
            background: var(--glass-bg);
            border-color: var(--glass-border);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Local Workspaces</div>
        <div class="local-history-container" id="localHistory">
            </div>
        <button class="ui-btn" id="clearLogsBtn" style="margin-top: auto; justify-content: center;">
            Clear Local Logs
        </button>
    </div>

    <div class="main-workspace">
        <div class="top-bar">
            <div class="brand-title">Zytherion//<span>Core</span></div>
            <div class="controls-group">
                <button class="ui-btn" id="themeToggleBtn">🌓 Toggle Theme</button>
                <button class="ui-btn" id="logoutBtn" style="color: #ef4444;">Disconnect</button>
            </div>
        </div>

        <div class="chat-viewports" id="chat-container">
            <div class="message bot">
                Hello. Core operations online. Local storage tracking systems active. How can I assist you today?
            </div>
        </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Transmit command strings or messages..." autocomplete="off">
                <button class="send-action-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Theme Engine Implementation
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const currentTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", currentTheme);

        themeToggleBtn.addEventListener("click", () => {
            let theme = document.documentElement.getAttribute("data-theme");
            let nextTheme = theme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", nextTheme);
            localStorage.setItem("theme", nextTheme);
        });

        // Logout Interceptor
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
